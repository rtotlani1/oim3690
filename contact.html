<main>
  <h1>Contact</h1>

  <form class="contact-form" action="https://oim.zhili.dev/echo/view" method="POST" aria-labelledby="contactHeading">
    <fieldset>
      <legend id="contactHeading">Send me a message</legend>

      <div class="form-field">
        <label class="form-label" for="name">Name</label>
        <input class="form-control" type="text" id="name" name="name" required aria-required="true" />
      </div>

      <div class="form-field">
        <label class="form-label" for="email">Email</label>
        <input class="form-control" type="email" id="email" name="email" required aria-required="true" />
      </div>

      <div class="form-field">
        <label class="form-label" for="phone">Phone (optional)</label>
        <input class="form-control" type="tel" id="phone" name="phone" inputmode="tel" pattern="[+0-9 ()-]{7,}" aria-describedby="phoneHelp" />
        <small id="phoneHelp" class="form-help">Enter country code if outside your country, e.g. +1 555-555-5555.</small>
      </div>

      <div class="form-field">
        <label class="form-label" for="message">Message</label>
        <textarea class="form-control" id="message" name="message" rows="6" required aria-required="true"></textarea>
      </div>

      <div class="form-field">
        <button class="btn-primary" type="submit">Submit</button>
      </div>
    </fieldset>
  </form>
</main>
