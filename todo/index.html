<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Todo App</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
        background: linear-gradient(135deg, #f5f7ff, #e8f0ff);
        color: #1f2937;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .app {
        width: min(100%, 480px);
        background: white;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.12);
      }

      h1 {
        margin-top: 0;
        margin-bottom: 8px;
        font-size: 1.8rem;
      }

      p {
        margin-top: 0;
        color: #64748b;
      }

      .input-row {
        display: flex;
        gap: 8px;
        margin: 16px 0;
      }

      input {
        flex: 1;
        padding: 10px 12px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        font-size: 1rem;
      }

      button {
        border: none;
        border-radius: 8px;
        padding: 10px 14px;
        cursor: pointer;
        font-weight: 600;
      }

      .add-btn {
        background: #2563eb;
        color: white;
      }

      .add-btn:hover {
        background: #1d4ed8;
      }

      ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      li {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 0;
        border-bottom: 1px solid #e2e8f0;
      }

      li:last-child {
        border-bottom: none;
      }

      .todo-text {
        display: flex;
        align-items: center;
        gap: 10px;
        flex: 1;
      }

      .todo-text.done span {
        text-decoration: line-through;
        color: #94a3b8;
      }

      .delete-btn {
        background: #ef4444;
        color: white;
      }

      .summary {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 12px;
        margin: 16px 0;
        padding: 12px;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
      }

      .summary-item {
        text-align: center;
      }

      .summary-label {
        display: block;
        font-size: 0.75rem;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-bottom: 4px;
      }

      .summary-bar {
        display: flex;
        height: 10px;
        border-radius: 999px;
        overflow: hidden;
        background: #e2e8f0;
      }

      .finished-bar {
        background: #22c55e;
        height: 100%;
      }

      .pending-bar {
        background: #f59e0b;
        height: 100%;
      }

      .actions-row {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 16px;
      }

      .clear-btn {
        background: #64748b;
        color: white;
      }

      .clear-btn:hover {
        background: #475569;
      }

      .clear-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .empty-state {
        text-align: center;
        color: #64748b;
        padding: 16px 0;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <h1>📝 Todo App</h1>
      <p>Add a task, mark it done, or remove it.</p>

      <div class="summary" aria-label="Task summary">
        <div class="summary-item">
          <span class="summary-label">Finished</span>
          <strong id="finished-count">0</strong>
        </div>
        <div class="summary-bar" aria-label="Task progress">
          <div id="finished-bar" class="finished-bar" style="width: 0%"></div>
          <div id="pending-bar" class="pending-bar" style="width: 0%"></div>
        </div>
        <div class="summary-item">
          <span class="summary-label">Pending</span>
          <strong id="pending-count">0</strong>
        </div>
      </div>

      <form id="todo-form" class="input-row">
        <input id="todo-input" type="text" placeholder="What needs to be done?" required />
        <button class="add-btn" type="submit">Add</button>
      </form>

      <div class="actions-row">
        <button id="clear-btn" class="clear-btn" type="button" disabled>Clear all</button>
      </div>

      <ul id="todo-list"></ul>
    </div>

    <script src="script.js"></script>
  </body>
</html>
