<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 2rem;
      background: #f5f7fb;
      color: #1f2937;
    }

    #app {
      max-width: 720px;
      margin: 0 auto;
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    .card {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      margin-top: 1rem;
    }

    .data-list {
      padding-left: 1.1rem;
      margin: 0.75rem 0 0;
    }
  </style>
</head>
<body>
  <main id="app"></main>

  <script type="module" src="js/main.js"></script>
</body>
</html>
